# Конфиг отдельного ДКП-бота (Cloudflare Worker).
# В Workers Builds укажите Root directory = dkp-bot
#
# Секреты (НЕ здесь, только в дашборде → Variables and Secrets → Secret):
#   TELEGRAM_BOT_TOKEN — токен бота (@BotFather)
#   YANDEX_API_KEY     — ключ Яндекс (OCR + YandexGPT)
#   TINKOFF_PASSWORD   — пароль терминала Тинькофф (подпись запросов/уведомлений)
#   CP_API_SECRET      — «Пароль для API» CloudPayments (если используется CloudPayments)

name = "dkp-bot"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
# Адрес мини-аппа.
MINI_APP_URL = "https://dkp-mini.pages.dev"
# Folder ID Яндекс Облака (для OCR/GPT).
YANDEX_FOLDER_ID = "b1gljk9huj8ot3pn8g1c"
# --- Оплата. Провайдер: Тинькофф (Т-Касса) — если задан TINKOFF_TERMINAL_KEY + секрет TINKOFF_PASSWORD. ---
# Иначе CloudPayments (если задан CP_PUBLIC_ID). Платный режим требует ещё и KV SUBS ниже.
TINKOFF_TERMINAL_KEY = "1782385049424"   # терминал Тинькофф (БОЕВОЙ); тестовый — 1782385049405DEMO
# Секрет TINKOFF_PASSWORD задаётся в дашборде Cloudflare (Variables and Secrets → Secret), НЕ здесь.
CP_PUBLIC_ID = ""          # CloudPayments отключён (перешли на Тинькофф)
# Тарифы (₽). Можно не задавать — действуют значения по умолчанию из worker.js.
PRICE_ONE = "49"           # один договор (разовый доступ) — ВРЕМЕННО 49₽ для теста (вернуть 99)
PRICE_1M  = "500"          # подписка 1 месяц
PRICE_3M  = "1200"         # подписка 3 месяца
PRICE_6M  = "2000"         # подписка полгода

# --- KV для хранения доступа (sub:<user_id> = срок окончания, credits:<user_id> = остаток разовых) ---
# Namespace: Cloudflare → Workers & Pages → KV → Create (DKP_SUBS).
[[kv_namespaces]]
binding = "SUBS"
id = "9d2f0862e8bd4f5d8e5f804917a4e934"
